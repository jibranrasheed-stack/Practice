<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with in line & block elements</title>
    <link rel="stylesheet" href="style.css">
</head>
<h1>Internship applying form </h1>
<body>
    <Form>
        <label for="First Name">First name
         <input type="text" placeholder=" Enter your name" required id=" First name "> </label>

         <p> <label for="LAST NAME ">Last Name
        <input type="text" placeholder=" Enter your Last name"> </label></p>
       
              
         <p><em>Password 
             <input type="password" name="Pass" id="pass" placeholder=" Enter your password"></em> </p>

    <label for="Email">Email Address</label>
    <input type="email" name="Email" id="email" placeholder="Enter your valid email address">
    <label for="Uni"> Universty/Collage</label>
    <input type="text" placeholder="Enter your institite name " id="uni/collage">
   
    <h3>Degree program</h3>
<select name="nSekect" id="">
    <option value="">Select your degree</option>
    <option value="CS"> Computer Science</option>
    <option value="BIO"> Biology</option>
    <option value="CHEM"> Chemistry</option>
    <option value="MED"> Medical Science</option>
    <option value="SOFT"> Software Engineering</option>
    <option value="CS">Mathematics</option>
    </select>
    <!-- Skill Section  -->
   <p> <label for="skill Section"></label>
     <input type="textarea" name="skils" id="skills" placeholder=" Put your relativant skill according to your degree"></p>
    <!-- Date of joining  -->
   <p> <label for="Joining"> Job Starting </label>    
    <input type="date" name="date" id="date" ></p>
    <!-- for resume  -->
   <p> <input type="file" name="file" id="file" placeholder="Upload your resume"></p>
    
    
    
 </Form>
</body>
</html>
